services:
  db:
    image: postgres:16
    container_name: fullstack-db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./be
    container_name: fullstack-backend
    environment:
      DB_NAME: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_PORT: 5432
      DB_HOST: db
      BE_PORT: 3000
      NODE_ENV: development
      JWT_SECRET: ${JWT_SECRET:-local-development-jwt-secret}
      REFRESH_SECRET: ${REFRESH_SECRET:-local-development-refresh-secret}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-local-development-access-key}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-local-development-secret-key}
      S3_PUBLIC_DOMAIN: ${S3_PUBLIC_DOMAIN:-http://localhost:9000}
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy
  frontend:
    build: ./fe
    container_name: fullstack-frontend
    environment:
      FE_PORT: 5173
      REACT_APP_ENABLE_MOCKS: 'false'
    ports:
      - '5173:5173'
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: fullstack-nginx
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
