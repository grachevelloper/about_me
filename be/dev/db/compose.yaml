services:
    postgres:
        image: postgres:16
        deploy:
            resources:
                limits:
                    memory: 2G
                    cpus: "2.0"
                reservations:
                    memory: 1G
                    cpus: "1.0"
        container_name: dev-postgres
        environment:
            POSTGRES_DB: postgres
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
            interval: 5s
            timeout: 5s
            retries: 10
        networks:
            - app_network

    nginx:
        image: nginx:1.27-alpine
        container_name: dev-fullstack-nginx
        ports:
            - "80:80"
        volumes:
            - ../nginx.conf:/etc/nginx/conf.d/default.conf:ro
        extra_hosts:
            - "host.docker.internal:host-gateway"
        networks:
            - app_network

volumes:
    postgres_data:

networks:
    app_network:
        driver: bridge
